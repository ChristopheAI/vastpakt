name: copy-extract

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/copy.yml'
      - '.github/workflows/copy.js'
      - 'redesign-moodboard/copy/urls.txt'

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install playwright@1.48.0
      - run: npx playwright install --with-deps chromium
      - run: node .github/workflows/copy.js
      - name: commit copy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add redesign-moodboard/copy
          if git diff --staged --quiet; then
            echo "no copy changes"
          else
            git commit -m "chore: extract copy DNA [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
