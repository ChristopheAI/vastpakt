name: dna-extract

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/dna.yml'
      - '.github/workflows/dna.js'
      - 'redesign-moodboard/dna/urls.txt'

permissions:
  contents: write

jobs:
  dna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install playwright@1.48.0
      - run: npx playwright install --with-deps chromium
      - run: node .github/workflows/dna.js
      - name: commit dna
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add redesign-moodboard/dna
          if git diff --staged --quiet; then
            echo "no dna changes"
          else
            git commit -m "chore: extract design DNA tokens [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
